<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screen Recorder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="logo-dot" aria-hidden="true"></span>
      <span class="brand">Rec</span>
    </header>

    <main class="main">
      <section id="state-idle" class="state">
        <p class="lead">Record screen → MP4</p>

        <label class="option">
          <span class="option-label">Microphone</span>
          <input type="checkbox" id="mic-toggle">
          <span class="switch" aria-hidden="true"></span>
        </label>

        <button id="btn-start" class="btn-record" aria-label="Start recording">
          <span class="btn-record-inner"></span>
        </button>
        <span class="btn-caption">Start</span>
      </section>

      <section id="state-picking" class="state hidden">
        <div class="status-ring">
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <h2 class="title">Choose source</h2>
        <p class="lead">Select screen, window, or tab</p>
        <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
      </section>

      <section id="state-recording" class="state hidden">
        <div class="live-badge">
          <span class="live-dot"></span>
          Live
        </div>
        <div id="timer" class="timer">00:00</div>
        <p class="lead">Recording in background — reopen anytime to stop</p>
        <button id="btn-stop" class="btn btn-stop" aria-label="Stop recording">
          <span class="stop-icon"></span>
          Stop
        </button>
      </section>

      <section id="state-processing" class="state hidden">
        <div class="status-ring">
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <h2 class="title">Processing</h2>
        <p id="processing-subtitle" class="lead">Preparing MP4…</p>
      </section>

      <section id="state-done" class="state hidden">
        <div class="status-icon status-icon--ok">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>
        <h2 class="title">Done</h2>
        <p class="lead">Saved to Downloads</p>
        <button id="btn-new" class="btn btn-ghost">Record again</button>
      </section>

      <section id="state-error" class="state hidden">
        <div class="status-icon status-icon--err">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 8v4M12 16h.01"/>
          </svg>
        </div>
        <h2 class="title">Failed</h2>
        <p id="error-message" class="lead">Something went wrong</p>
        <button id="btn-retry" class="btn btn-ghost">Try again</button>
      </section>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
